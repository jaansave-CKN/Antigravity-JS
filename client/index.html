  <!-- Cache-busting: el navegador nunca guarda este HTML en caché.
       Los assets JS/CSS sí se cachean (sus nombres cambian con el hash). -->

  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"

            "body-md":           ["Hanken Grotesk"],
            "body-sm":           ["Hanken Grotesk"],

            "label-sm":           ["10px", { lineHeight: "14px", letterSpacing: "0.08em", fontWeight: "600" }],
          },
          spacing: {
            xs: "4px", sm: "8px", md: "16px", lg: "24px", xl: "32px",
            gutter: "20px", unit: "4px", "container-max": "1440px",
          },
          colors: {
            primary:   "#000000",
            secondary: "#0058be",
            surface:   "#ffffff",

            onSurface:  { DEFAULT: "#191c1e", variant: "#45464d" },

  <!-- Tailwind CDN async — no bloquea el parser ni el montaje de React -->
  <script>
    (function() {
      var s = document.createElement('script');
      s.src = 'https://cdn.tailwindcss.com?plugins=forms,container-queries';
      s.onload = function() { if (window.tailwind) tailwind.config = window.__tailwindConfig; };
      document.head.appendChild(s);
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
  <!-- ERROR CATCHER: muestra errores JS en pantalla antes de que React monte -->
  <script>
    window.__errors = [];
    window.onerror = function(msg, src, line, col, err) {
      var d = document.createElement('div');
      d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#b91c1c;color:#fff;padding:16px;font:13px monospace;z-index:99999;white-space:pre-wrap;word-break:break-all';
      d.textContent = 'JS ERROR: ' + msg + '\nArchivo: ' + src + ':' + line + ':' + col;
      document.body ? document.body.appendChild(d) : document.addEventListener('DOMContentLoaded', function(){ document.body.appendChild(d); });
      window.__errors.push(msg);
    };
    window.addEventListener('unhandledrejection', function(e) {
      var d = document.createElement('div');
      d.style.cssText = 'position:fixed;top:60px;left:0;right:0;background:#92400e;color:#fff;padding:16px;font:13px monospace;z-index:99999;white-space:pre-wrap;word-break:break-all';
      d.textContent = 'PROMISE REJECT: ' + (e.reason?.message || e.reason || e);
      document.body ? document.body.appendChild(d) : document.addEventListener('DOMContentLoaded', function(){ document.body.appendChild(d); });
    });
  </script>
  <style>
    html, body { min-height: 100vh; width: 100%; margin: 0; padding: 0; }
    #root { min-height: 100vh; }
    .leaflet-container { height: 100%; width: 100%; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1; }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
