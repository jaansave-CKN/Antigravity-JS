name: Radar de Convocatorias 24/7

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/*'
      - 'src/**'
      - 'server.js'
      - 'render.yaml'
      - 'package.json'
      - 'vite.config.ts'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}

      - name: Verificar build
        run: |
          echo "Build completado"
          ls -la dist/

      - name: Deploy a Firebase Hosting
        uses: w9jks/firebase-action@v2
        with:
          args: deploy --only hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Notificar deployment
        run: |
          echo "✅ Deploy completado exitosamente"
          echo "Fecha: $(date)"
          echo "URL: https://antigravity-jairo-2026.web.app"

      - name: Trigger Render deploy
        run: |
          curl -s -X POST "https://api.render.com/deploy/srv-d87vvtjbc2fs73eej770?key=6vGTV_HBe6k" && echo "Render deploy triggered: $(date)"

  buscar-convocatorias:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install requests beautifulsoup4 google-serp-api

      - name: Ejecutar radar
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/radar_search.py
        continue-on-error: true

      - name: Verificar cambios
        id: git-diff
        run: |
          git diff --stat

      - name: Commit cambios
        if: github.event_name == 'schedule'
        run: |
          git config --local user.email "radar@antigravity.com"
          git config --local user.name "Radar Automático"
          git add -A
          git commit -m "Actualización automática de convocatorias $(date '+%Y-%m-%d %H:%M')" || echo "No hay cambios"
          git push || echo "No se pudo hacer push"

      - name: Notificar resultados
        if: always()
        run: |
          echo "## Resultados del radar" >> $GITHUB_STEP_SUMMARY
          echo "- Fecha: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- Estado: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY